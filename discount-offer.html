<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="assets/css/mobile-ux.css?v=1.0.1" rel="stylesheet">
<link href="assets/css/premium-ui.css?v=1.0.1" rel="stylesheet">
<meta name="theme-color" content="#00875A" />
  <title>عرض خاص</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f7fcf8;
      --green-soft: #7eb89a;
      --green-deep: #5a9a78;
      --green-cta: #1b5e3a;
      --green-cta-mid: #2d6a4f;
      --orange-soft: #f4a574;
      --orange-deep: #e8925c;
      --text: #2d3d35;
      --white: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(1.25rem, 5vw, 2rem);
      padding-bottom: clamp(2rem, 8vw, 3rem);
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(165deg, var(--bg) 0%, #fff9f4 100%);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .wrap {
      width: 100%;
      max-width: 22rem;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.65rem, 6vw, 2rem);
      font-weight: 700;
      line-height: 1.35;
      color: var(--green-deep);
    }

    .desc {
      margin: 0 0 2rem;
      font-size: clamp(0.95rem, 3.8vw, 1.05rem);
      line-height: 1.55;
      color: #5c6b62;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 18rem;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(145deg, var(--orange-soft), var(--orange-deep));
      color: var(--white);
      box-shadow: 0 8px 24px rgba(232, 146, 92, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 10px 28px rgba(232, 146, 92, 0.42);
    }

    .btn-cta {
      margin-top: 0.25rem;
      padding: 1.15rem 1.75rem;
      font-size: 1.12rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      background: linear-gradient(145deg, var(--green-cta-mid), var(--green-cta));
      color: var(--white);
      box-shadow:
        0 4px 0 rgba(15, 60, 38, 0.35),
        0 12px 32px rgba(27, 94, 58, 0.45);
      text-decoration: none;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .btn-cta:hover {
      box-shadow:
        0 4px 0 rgba(15, 60, 38, 0.4),
        0 14px 36px rgba(27, 94, 58, 0.5);
    }

    .hidden {
      display: none !important;
    }

    #result:not(.hidden) {
      animation: resultIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes resultIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .success-msg {
      margin: 0 0 0.65rem;
      font-size: clamp(1.15rem, 4.8vw, 1.35rem);
      font-weight: 700;
      line-height: 1.45;
      color: var(--green-cta);
    }

    .success-msg .pct {
      font-weight: 800;
      color: var(--orange-deep);
    }

    .urgency {
      margin: 0 0 1.35rem;
      font-size: clamp(0.9rem, 3.6vw, 1rem);
      font-weight: 600;
      color: #c45c2a;
      letter-spacing: 0.02em;
    }

    .offer-denied-msg--lock {
      color: #92400e;
      background: rgba(254, 243, 199, 0.92);
      border-color: rgba(180, 83, 9, 0.35);
    }

    .offer-denied-msg {
      margin: 0;
      padding: 1.25rem 1rem;
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      font-weight: 800;
      line-height: 1.5;
      color: #9f1239;
      background: rgba(254, 226, 226, 0.85);
      border: 1px solid rgba(190, 24, 93, 0.25);
      border-radius: 16px;
    }

    /* احتفال — كونفيتي */
    .offer-confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }

    .offer-confetti-piece {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 11px;
      border-radius: 2px;
      opacity: 0.95;
      will-change: transform, opacity;
    }

    @keyframes offer-confetti-fall {
      from {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translate3d(var(--dx, 0px), 110vh, 0) rotate(var(--rot, 720deg));
        opacity: 0.35;
      }
    }

    /* زر — اهتزاز قصير */
    @keyframes offer-btn-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px) rotate(-1deg); }
      40% { transform: translateX(6px) rotate(1deg); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .btn-shake {
      animation: offer-btn-shake 0.45s ease-in-out;
    }

    /* نسبة الخصم — تكبير + توهج */
    .success-msg .pct {
      display: inline-block;
      transform-origin: center;
    }

    .pct--animate {
      animation: offer-pct-pop 0.75s cubic-bezier(0.34, 1.45, 0.64, 1) both;
    }

    @keyframes offer-pct-pop {
      0% {
        transform: scale(0.35);
        opacity: 0;
        filter: blur(2px);
      }
      55% {
        transform: scale(1.18);
        opacity: 1;
        filter: blur(0);
      }
      100% {
        transform: scale(1);
        text-shadow:
          0 0 12px rgba(232, 146, 92, 0.95),
          0 0 28px rgba(27, 94, 58, 0.45),
          0 2px 0 rgba(255, 255, 255, 0.4);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .offer-confetti-piece { animation: none !important; opacity: 0; }
      .btn-shake { animation: none; }
      .pct--animate { animation: none; }
      #result:not(.hidden) { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="offerDenied" class="hidden" role="alert" aria-live="assertive">
      <p class="offer-denied-msg">⛔ هذا العرض غير متاح</p>
    </div>
    <div id="offerSessionLock" class="hidden" role="alert" aria-live="polite">
      <p class="offer-denied-msg offer-denied-msg--lock">🔒 استخدمت محاولة العجلة في هذه الجلسة. لا يمكن توليد خصم جديد.</p>
    </div>
    <div id="intro">
      <h1>🎁 اربح خصمك الآن!</h1>
      <p class="desc">اضغط الزر واكتشف عرضك الخاص</p>
      <button type="button" class="btn btn-primary" id="revealBtn">🎰 احصل على خصمك</button>
    </div>

    <div id="result" class="hidden" role="status" aria-live="polite">
      <p class="success-msg" id="successMsgLine">
        🎉 مبروك! حصلت على خصم <span class="pct" id="pct">0</span>%
      </p>
      <p class="urgency">⏳ العرض ينتهي قريبًا</p>
      <button type="button" class="btn btn-cta" id="useDiscountBtn">🔥 استخدم الخصم الآن</button>
    </div>
  </div>

  <script src="script.js?v=3.0.0"></script>
</body>
</html>
