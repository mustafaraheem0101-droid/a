<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- CSS unified - build tools/build-css.js -->
    <link rel="stylesheet" href="assets/css/dist/base-final.min.css">
<meta name="theme-color" content="#00875A" />
  <title>منتجات الصيدلية</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --green-price: #1b5e3a;
      --orange-btn: #e8925c;
      --orange-btn-deep: #d67a42;
      --banner-bg: linear-gradient(135deg, #fff5eb 0%, #e8f5ee 100%);
      --card-shadow: 0 8px 28px rgba(45, 61, 53, 0.08);
      --radius: 16px;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: #2d3d35;
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      max-width: 28rem;
      margin: 0 auto;
      padding: 0 clamp(1rem, 4vw, 1.25rem) clamp(2rem, 6vw, 2.5rem);
    }

    .banner {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -1rem 1.25rem;
      padding: clamp(0.85rem, 3vw, 1.1rem) clamp(1rem, 4vw, 1.25rem);
      background: var(--banner-bg);
      border-bottom: 1px solid rgba(27, 94, 58, 0.12);
      text-align: center;
      font-size: clamp(0.95rem, 3.8vw, 1.05rem);
      font-weight: 700;
      line-height: 1.45;
      color: #2a4a38;
    }

    .banner.banner--expired {
      background: linear-gradient(135deg, #fdeef0 0%, #fff5f5 100%);
      border-bottom-color: rgba(180, 60, 80, 0.2);
      color: #8b2942;
    }

    .banner.banner--urgent {
      background: linear-gradient(135deg, #fde8e8 0%, #fff5f5 100%);
      border-bottom-color: rgba(180, 60, 80, 0.25);
    }

    .banner.banner--urgent .banner-timer {
      color: #b91c1c;
      font-weight: 800;
    }

    .banner-warn {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.9rem;
      font-weight: 800;
      color: #b91c1c;
    }

    h1.visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid rgba(27, 94, 58, 0.1);
      border-radius: var(--radius);
      padding: 1.15rem 1.2rem;
      box-shadow: var(--card-shadow);
    }

    .card-title {
      margin: 0 0 0.85rem;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      color: #243830;
    }

    .prices {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.65rem 1rem;
      margin-bottom: 1rem;
    }

    .price-old {
      font-size: 0.95rem;
      font-weight: 600;
      color: #dc2626;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      opacity: 0.7;
    }

    .price-new {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--green-price);
    }

    .price-only {
      font-size: 1.15rem;
      font-weight: 700;
      color: #243830;
    }

    .btn-order {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(145deg, var(--orange-btn), var(--orange-btn-deep));
      box-shadow: 0 6px 20px rgba(232, 146, 92, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .btn-order:active {
      transform: scale(0.98);
    }

    .btn-order:hover {
      box-shadow: 0 8px 24px rgba(232, 146, 92, 0.42);
    }
  </style>
</head>
<body>
  <h1 class="visually-hidden">منتجات الصيدلية</h1>
  <div class="page">
    <div class="banner" id="banner" role="status" aria-live="polite">
      <div id="bannerContent"></div>
    </div>
    <div class="list" id="productList"></div>
  </div>

  <script src="products.js?v=2.1.3"></script>
  <!-- lazy-loading added -->
  <link rel="stylesheet" href="assets/css/lazy-images.css">
  <script src="assets/js/lazy-images.js" defer></script>
</body>
</html>
